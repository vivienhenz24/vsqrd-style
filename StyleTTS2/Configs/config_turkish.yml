log_dir: "Models/Turkish"
first_stage_path: "first_stage.pth"
save_freq: 2
log_interval: 10
device: "cuda"
epochs_1st: 200
epochs_2nd: 100
epochs: 100
batch_size: 24
max_len: 400
pretrained_model: "../weights/Models/LibriTTS/epochs_2nd_00020.pth"
second_stage_load_pretrained: true
load_only_params: false

F0_path: "Utils/JDC/bst.t7"
ASR_config: "Utils/ASR/config.yml"  # architecture only, no checkpoint needed
PLBERT_dir: "Utils/PLBERT_turkish/"
alignment_dir: "../alignments/"

data_params:
  train_data: "Data/tr_train.txt"
  val_data: "Data/tr_val.txt"
  root_path: ".."
  mel_cache_dir: "../mel_cache"
  OOD_data: "Data/tr_ood.txt"
  min_length: 50

preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300

model_params:
  multispeaker: true

  dim_in: 64
  hidden_dim: 512
  max_conv_dim: 512
  n_layer: 3
  n_mels: 80

  n_token: 178
  max_dur: 50
  style_dim: 128

  dropout: 0.2

  decoder:
    type: 'hifigan'
    resblock_kernel_sizes: [3, 7, 11]
    upsample_rates: [10, 5, 3, 2]
    upsample_initial_channel: 512
    resblock_dilation_sizes: [[1,3,5], [1,3,5], [1,3,5]]
    upsample_kernel_sizes: [20, 10, 6, 4]

  slm:
    model: 'microsoft/wavlm-base-plus'
    sr: 16000
    hidden: 768
    nlayers: 13
    initial_channel: 64

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

loss_params:
  lambda_mel: 5.
  lambda_gen: 1.
  lambda_slm: 1.
  lambda_mono: 1.
  lambda_s2s: 1.
  TMA_epoch: 50
  lambda_F0: 1.
  lambda_norm: 1.
  lambda_dur: 1.
  lambda_ce: 20.
  lambda_sty: 1.
  lambda_diff: 1.
  diff_epoch: 20
  joint_epoch: 50

optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001
  ft_lr: 0.00001
  pct_start: 0.0

slmadv_params:
  min_len: 400
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
