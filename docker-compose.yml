services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: mifi-trainer:latest
    container_name: mifi-trainer
    working_dir: /workspace
    volumes:
      - ./:/workspace
    gpus: all
    shm_size: "16gb"
    stdin_open: true
    tty: true
    command: python -m mifi.main
